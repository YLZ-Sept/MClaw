info:
  contact: {}
paths:
  /access_token:
    post:
      consumes:
      - application/json
      description: 通过 app_id 和 secret_key 获取接口调用凭证
      parameters:
      - description: 请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OpenAccessTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/echo.JSON'
            - properties:
                data:
                  $ref: '#/definitions/dto.OpenAccessTokenResp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/echo.JSON'
      summary: 获取 Access Token
      tags:
      - 认证
  /audio_task_state:
    post:
      consumes:
      - application/json
      description: 根据任务ID查询语音合成任务的当前状态
      parameters:
      - description: 任务状态查询参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OpenAudioTaskStateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 任务状态
          schema:
            allOf:
            - $ref: '#/definitions/echo.JSON'
            - properties:
                data:
                  $ref: '#/definitions/dto.OpenAudioTaskStateRsp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/echo.JSON'
      security:
      - AccessToken: []
      summary: 获取语音合成任务状态
      tags:
      - 语音生成
  /common/create_upload_url:
    get:
      description: 获取OSS预签名URL，用于客户端直传文件
      parameters:
      - description: 服务类型
        in: query
        name: service
        required: true
        type: string
      - description: 文件名
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 上传链接信息
          schema:
            $ref: '#/definitions/echo.JSON'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/echo.JSON'
      security:
      - AccessToken: []
      summary: 获取文件上传链接
      tags:
      - 文件管理
  /common/delete_file:
    post:
      consumes:
      - application/json
      description: 根据文件ID删除已上传的文件
      parameters:
      - description: 删除参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.DpOpenFileDeleteReq'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/echo.JSON'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/echo.JSON'
      security:
      - AccessToken: []
      summary: 删除文件
      tags:
      - 文件管理
  /common/file_detail:
    get:
      description: 根据文件ID获取单个文件的详细信息
      parameters:
      - description: 文件ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 文件详情
          schema:
            allOf:
            - $ref: '#/definitions/echo.JSON'
            - properties:
                data:
                  $ref: '#/definitions/dto.DpOpenFileItemRspData'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/echo.JSON'
      security:
